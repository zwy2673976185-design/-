<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>松下机器人手册 - 登录系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        
        /* 登录容器 */
        .login-container {
            max-width: 400px;
            margin: 50px auto;
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            animation: slideIn 0.5s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .login-header p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            border-color: #667eea;
            outline: none;
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .login-btn:hover {
            transform: translateY(-2px);
        }
        
        .login-footer {
            text-align: center;
            margin-top: 25px;
            color: #666;
        }
        .toggle-form {
            color: #667eea;
            cursor: pointer;
            font-weight: 500;
        }
        .toggle-form:hover {
            text-decoration: underline;
        }
        
        /* 悬浮窗样式 */
        .floating-window {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.15);
            z-index: 9999;
            transition: all 0.3s ease;
            min-width: 50px;
            min-height: 50px;
            overflow: hidden;
        }
        .floating-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 15px;
            cursor: move;
            font-weight: 600;
            user-select: none;
        }
        .floating-content {
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
        }
        .floating-content ul {
            list-style: none;
        }
        .floating-content li {
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .floating-content li:hover {
            background: #f8f9ff;
        }
        .floating-content li i {
            font-size: 18px;
            width: 24px;
            text-align: center;
        }
        
        /* 悬浮按钮（最小化状态） */
        .floating-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 9998;
            transition: all 0.3s;
        }
        .floating-btn:hover {
            transform: scale(1.1);
        }
        
        /* 手册内容容器（登录后显示） */
        .manual-container {
            display: none;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            margin-top: 20px;
        }
        
        /* 通知消息 */
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            z-index: 10000;
            transition: transform 0.4s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .notification.show {
            transform: translateX(-50%) translateY(0);
        }
        .notification.success { border-left: 4px solid #27ae60; }
        .notification.error { border-left: 4px solid #e74c3c; }
        .notification.info { border-left: 4px solid #3498db; }
        
        /* 用户信息栏 */
        .user-info-bar {
            background: #f8f9ff;
            padding: 12px 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .user-details {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
    </style>
    <!-- Font Awesome 图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- 登录/注册界面 -->
    <div id="loginContainer" class="login-container">
        <div class="login-header">
            <h1>🤖 松下机器人手册</h1>
            <p>白名单登录系统 - 只有授权用户可访问</p>
        </div>
        
        <!-- 登录表单 -->
        <form id="loginForm">
            <div class="form-group">
                <label for="loginUsername"><i class="fas fa-user"></i> 用户名</label>
                <input type="text" id="loginUsername" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label for="loginPassword"><i class="fas fa-lock"></i> 密码</label>
                <input type="password" id="loginPassword" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> 登录
            </button>
        </form>
        
        <!-- 注册表单（初始隐藏） -->
        <form id="registerForm" style="display: none;">
            <div class="form-group">
                <label for="registerUsername"><i class="fas fa-user-plus"></i> 用户名</label>
                <input type="text" id="registerUsername" placeholder="设置用户名（3-20位）" required>
            </div>
            <div class="form-group">
                <label for="registerPassword"><i class="fas fa-key"></i> 密码</label>
                <input type="password" id="registerPassword" placeholder="设置密码（至少6位）" required>
            </div>
            <div class="form-group">
                <label for="registerEmail"><i class="fas fa-envelope"></i> 邮箱（可选）</label>
                <input type="email" id="registerEmail" placeholder="用于接收通知（可选）">
            </div>
            <div class="form-group" style="font-size: 12px; color: #666; background: #f9f9f9; padding: 10px; border-radius: 5px;">
                <i class="fas fa-info-circle"></i> 
                注册后需要管理员审核批准，请耐心等待或联系管理员。
            </div>
            <button type="submit" class="login-btn" id="registerBtn" style="background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%);">
                <i class="fas fa-user-check"></i> 提交注册申请
            </button>
        </form>
        
        <div class="login-footer">
            <span id="toggleText">没有账号？</span>
            <span class="toggle-form" id="toggleFormBtn">立即注册</span>
        </div>
    </div>
    
    <!-- 手册内容容器（登录后显示） -->
    <div id="manualContainer" class="manual-container">
        <!-- 用户信息栏 -->
        <div class="user-info-bar">
            <div class="user-details">
                <div class="user-avatar" id="userAvatar">A</div>
                <div>
                    <div style="font-weight: bold;" id="displayUsername">用户名</div>
                    <div style="font-size: 12px; color: #666;" id="userRole">普通用户</div>
                </div>
            </div>
            <button id="logoutBtn" style="padding: 8px 15px; background: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer;">
                <i class="fas fa-sign-out-alt"></i> 退出登录
            </button>
        </div>
        
        <!-- 手册内容区域 -->
        <div id="manualContent" style="padding: 20px;">
            <!-- 内容将通过JavaScript动态加载 -->
            <h2>正在加载手册内容...</h2>
            <div class="loader" style="text-align: center; padding: 40px;">
                <div style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;"></div>
            </div>
        </div>
    </div>
    
    <!-- 悬浮窗（最小化时显示） -->
    <div class="floating-btn" id="floatingBtn">
        <i class="fas fa-bars"></i>
    </div>
    
    <!-- 悬浮窗（展开状态） -->
    <div id="floatingWindow" class="floating-window" style="display: none;">
        <div class="floating-header" id="floatingHeader">
            <i class="fas fa-cog"></i> 快捷操作
        </div>
        <div class="floating-content">
            <ul>
                <li onclick="refreshContent()"><i class="fas fa-sync-alt"></i> 刷新内容</li>
                <li onclick="showUserInfo()"><i class="fas fa-user-circle"></i> 我的信息</li>
                <li onclick="showNotifications()"><i class="fas fa-bell"></i> 系统通知</li>
                <li onclick="contactAdmin()"><i class="fas fa-headset"></i> 联系管理员</li>
                <li onclick="toggleEditMode()"><i class="fas fa-edit"></i> 编辑模式</li>
                <li onclick="showSettings()"><i class="fas fa-cog"></i> 设置</li>
                <li onclick="logout()"><i class="fas fa-sign-out-alt" style="color: #e74c3c;"></i> 退出登录</li>
            </ul>
        </div>
    </div>
    
    <!-- 通知消息 -->
    <div id="notification" class="notification">
        <i class="fas fa-info-circle"></i>
        <span id="notificationMessage">这是一条通知</span>
    </div>

    <script>
        // ===== 配置信息 =====
        const CONFIG = {
            API_BASE_URL: 'https://您的Render服务地址.onrender.com', // 请修改为您的Render地址
            APP_VERSION: '1.1.0',
            STORAGE_KEYS: {
                TOKEN: 'robot_manual_token',
                USER_INFO: 'robot_manual_user'
            }
        };

        // ===== 全局状态 =====
        let currentUser = null;
        let isEditMode = false;
        let floatingWindowDragging = false;
        let floatingWindowOffset = { x: 0, y: 0 };

        // ===== DOM元素引用 =====
        const loginContainer = document.getElementById('loginContainer');
        const manualContainer = document.getElementById('manualContainer');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const toggleFormBtn = document.getElementById('toggleFormBtn');
        const toggleText = document.getElementById('toggleText');
        const floatingBtn = document.getElementById('floatingBtn');
        const floatingWindow = document.getElementById('floatingWindow');
        const floatingHeader = document.getElementById('floatingHeader');
        const notification = document.getElementById('notification');
        const notificationMessage = document.getElementById('notificationMessage');
        const displayUsername = document.getElementById('displayUsername');
        const userAvatar = document.getElementById('userAvatar');
        const userRole = document.getElementById('userRole');
        const logoutBtn = document.getElementById('logoutBtn');
        const manualContent = document.getElementById('manualContent');

        // ===== 页面初始化 =====
        document.addEventListener('DOMContentLoaded', function() {
            console.log('松下机器人手册登录系统 v' + CONFIG.APP_VERSION);
            
            // 检查是否已登录
            checkLoginStatus();
            
            // 绑定事件
            bindEvents();
        });

        // ===== 登录状态检查 =====
        function checkLoginStatus() {
            const token = localStorage.getItem(CONFIG.STORAGE_KEYS.TOKEN);
            const userInfo = localStorage.getItem(CONFIG.STORAGE_KEYS.USER_INFO);
            
            if (token && userInfo) {
                try {
                    currentUser = JSON.parse(userInfo);
                    showManualContent();
                } catch (e) {
                    localStorage.clear();
                    showLoginForm();
                }
            } else {
                showLoginForm();
            }
        }

        // ===== 事件绑定 =====
        function bindEvents() {
            // 登录表单提交
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                await handleLogin();
            });
            
            // 注册表单提交
            registerForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                await handleRegister();
            });
            
            // 切换登录/注册表单
            toggleFormBtn.addEventListener('click', toggleLoginRegister);
            
            // 退出登录
            logoutBtn.addEventListener('click', logout);
            
            // 悬浮按钮点击
            floatingBtn.addEventListener('click', toggleFloatingWindow);
            
            // 悬浮窗拖拽
            floatingHeader.addEventListener('mousedown', startDragging);
            floatingHeader.addEventListener('touchstart', startDragging);
            
            // 停止拖拽
            document.addEventListener('mousemove', doDragging);
            document.addEventListener('touchmove', doDragging);
            document.addEventListener('mouseup', stopDragging);
            document.addEventListener('touchend', stopDragging);
        }

        // ===== 登录处理 =====
        async function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            
            if (!username || !password) {
                showNotification('请输入用户名和密码', 'error');
                return;
            }
            
            showNotification('正在登录...', 'info');
            
            try {
                const response = await fetch(`${CONFIG.API_BASE_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // 保存登录信息
                    localStorage.setItem(CONFIG.STORAGE_KEYS.TOKEN, result.token);
                    localStorage.setItem(CONFIG.STORAGE_KEYS.USER_INFO, JSON.stringify(result.user));
                    
                    currentUser = result.user;
                    showManualContent();
                    showNotification('登录成功！', 'success');
                } else {
                    showNotification(result.error || '登录失败', 'error');
                }
            } catch (error) {
                console.error('登录失败:', error);
                showNotification('网络错误，请检查连接', 'error');
            }
        }

        // ===== 注册处理 =====
        async function handleRegister() {
            const username = document.getElementById('registerUsername').value.trim();
            const password = document.getElementById('registerPassword').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            
            if (username.length < 3 || username.length > 20) {
                showNotification('用户名长度需在3-20位之间', 'error');
                return;
            }
            
            if (password.length < 6) {
                showNotification('密码至少需要6位', 'error');
                return;
            }
            
            showNotification('正在提交注册申请...', 'info');
            
            try {
                const response = await fetch(`${CONFIG.API_BASE_URL}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, email })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showNotification('注册申请已提交！请等待管理员审核。', 'success');
                    // 切换回登录表单
                    toggleLoginRegister();
                } else {
                    showNotification(result.error || '注册失败', 'error');
                }
            } catch (error) {
                console.error('注册失败:', error);
                showNotification('网络错误，请检查连接', 'error');
            }
        }

        // ===== 界面切换 =====
        function showLoginForm() {
            loginContainer.style.display = 'block';
            manualContainer.style.display = 'none';
            floatingBtn.style.display = 'flex';
            floatingWindow.style.display = 'none';
        }

        function showManualContent() {
            loginContainer.style.display = 'none';
            manualContainer.style.display = 'block';
            floatingBtn.style.display = 'flex';
            floatingWindow.style.display = 'none';
            
            // 更新用户信息显示
            if (currentUser) {
                displayUsername.textContent = currentUser.username;
                userAvatar.textContent = currentUser.username.charAt(0).toUpperCase();
                userRole.textContent = currentUser.role === 'admin' ? '管理员' : '普通用户';
            }
            
            // 加载手册内容
            loadManualContent();
        }

        function toggleLoginRegister() {
            const isLoginVisible = loginForm.style.display !== 'none';
            
            if (isLoginVisible) {
                // 切换到注册表单
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                toggleText.textContent = '已有账号？';
                toggleFormBtn.textContent = '立即登录';
            } else {
                // 切换到登录表单
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                toggleText.textContent = '没有账号？';
                toggleFormBtn.textContent = '立即注册';
            }
        }

        // ===== 悬浮窗功能 =====
        function toggleFloatingWindow() {
            if (floatingWindow.style.display === 'none') {
                // 显示悬浮窗
                floatingWindow.style.display = 'block';
                floatingBtn.style.display = 'none';
                
                // 设置初始位置
                floatingWindow.style.top = '20px';
                floatingWindow.style.right = '20px';
                floatingWindow.style.left = 'auto';
            } else {
                // 隐藏悬浮窗
                floatingWindow.style.display = 'none';
                floatingBtn.style.display = 'flex';
            }
        }

        function startDragging(e) {
            floatingWindowDragging = true;
            
            const rect = floatingWindow.getBoundingClientRect();
            if (e.type === 'mousedown') {
                floatingWindowOffset.x = e.clientX - rect.left;
                floatingWindowOffset.y = e.clientY - rect.top;
            } else {
                floatingWindowOffset.x = e.touches[0].clientX - rect.left;
                floatingWindowOffset.y = e.touches[0].clientY - rect.top;
            }
            
            e.preventDefault();
        }

        function doDragging(e) {
            if (!floatingWindowDragging) return;
            
            let clientX, clientY;
            if (e.type === 'mousemove') {
                clientX = e.clientX;
                clientY = e.clientY;
            } else {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            }
            
            floatingWindow.style.position = 'fixed';
            floatingWindow.style.left = (clientX - floatingWindowOffset.x) + 'px';
            floatingWindow.style.top = (clientY - floatingWindowOffset.y) + 'px';
            floatingWindow.style.right = 'auto';
        }

        function stopDragging() {
            floatingWindowDragging = false;
        }

        // ===== 手册内容加载 =====
        async function loadManualContent() {
            const token = localStorage.getItem(CONFIG.STORAGE_KEYS.TOKEN);
            
            if (!token) {
                showNotification('请先登录', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${CONFIG.API_BASE_URL}/api/content`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (response.status === 401) {
                    // 令牌过期
                    localStorage.removeItem(CONFIG.STORAGE_KEYS.TOKEN);
                    showNotification('登录已过期，请重新登录', 'error');
                    showLoginForm();
                    return;
                }
                
                const result = await response.json();
                
                if (result.success) {
                    renderManualContent(result.data);
                } else {
                    showNotification(result.error || '加载内容失败', 'error');
                }
            } catch (error) {
                console.error('加载内容失败:', error);
                showNotification('网络错误，请检查连接', 'error');
            }
        }

        function renderManualContent(data) {
            // 这里简化渲染，您可以根据需要调整
            let html = `
                <div style="background: #2c3e50; color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
                    <h1 style="font-size: 24px; margin-bottom: 10px;">${data.title || '松下 TM-1800 机器人编程手册'}</h1>
                    <p style="opacity: 0.9;">${data.subtitle || '型号：YA-2JMR81F00 | 负载：6kg | 臂展：1809.5mm | 6轴'}</p>
                    <p style="font-size: 12px; margin-top: 10px;">最后更新: ${new Date(data.lastModified || Date.now()).toLocaleString()}</p>
                </div>
                
                <div style="background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
                    <h2 style="color: #2c3e50; margin-bottom: 15px;">📋 手册内容</h2>
                    <p>系统正在运行，您可以开始使用。</p>
                    ${currentUser.role === 'admin' ? 
                        '<button onclick="enterEditMode()" style="padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 5px; margin-top: 15px; cursor: pointer;"><i class="fas fa-edit"></i> 进入编辑模式</button>' : 
                        ''}
                </div>
                
                <div style="background: #e8f4fd; padding: 15px; border-radius: 10px; border-left: 4px solid #3498db;">
                    <h3><i class="fas fa-info-circle"></i> 系统说明</h3>
                    <ul style="margin-top: 10px; padding-left: 20px;">
                        <li>当前用户: ${currentUser.username} (${currentUser.role === 'admin' ? '管理员' : '普通用户'})</li>
                        <li>登录时间: ${new Date().toLocaleString()}</li>
                        <li>系统版本: ${CONFIG.APP_VERSION}</li>
                    </ul>
                </div>
            `;
            
            manualContent.innerHTML = html;
        }

        // ===== 悬浮窗功能实现 =====
        function refreshContent() {
            loadManualContent();
            showNotification('正在刷新内容...', 'info');
        }

        function showUserInfo() {
            if (!currentUser) return;
            
            alert(`
                用户信息：
                -------------------
                用户名: ${currentUser.username}
                角色: ${currentUser.role === 'admin' ? '管理员' : '普通用户'}
                邮箱: ${currentUser.email || '未设置'}
                -------------------
                系统信息：
                版本: ${CONFIG.APP_VERSION}
                登录时间: ${new Date().toLocaleString()}
            `);
        }

        function showNotifications() {
            showNotification('暂无新通知', 'info');
        }

        function contactAdmin() {
            const message = prompt('请输入您要发送给管理员的消息：');
            if (message) {
                showNotification('消息已发送给管理员', 'success');
                // 这里可以添加实际发送消息的逻辑
            }
        }

        function toggleEditMode() {
            if (currentUser.role !== 'admin') {
                showNotification('只有管理员可以进入编辑模式', 'error');
                return;
            }
            
            isEditMode = !isEditMode;
            showNotification(isEditMode ? '已进入编辑模式' : '已退出编辑模式', isEditMode ? 'success' : 'info');
        }

        function showSettings() {
            alert(`
                系统设置：
                -------------------
                1. 自动刷新: 开启
                2. 消息提醒: 开启
                3. 主题模式: 自动
                -------------------
                设置功能开发中...
            `);
        }

        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem(CONFIG.STORAGE_KEYS.TOKEN);
                localStorage.removeItem(CONFIG.STORAGE_KEYS.USER_INFO);
                currentUser = null;
                showLoginForm();
                showNotification('已退出登录', 'info');
            }
        }

        // ===== 通知功能 =====
        function showNotification(message, type = 'info') {
            notificationMessage.textContent = message;
            notification.className = `notification ${type}`;
            notification.classList.add('show');
            
            // 3秒后隐藏
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // ===== 工具函数 =====
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
